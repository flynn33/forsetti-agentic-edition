name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (do not create release artifacts)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  release-readiness:
    name: Validate Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release readiness
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-release-readiness.ps1
