name: Version Assignment

on:
  push:
    branches: [main]
    paths:
      - 'changelog/CHANGELOG.md'

permissions:
  contents: write

jobs:
  assign-version:
    name: Assign SemVer Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute and assign version
        run: |
          # -----------------------------------------------------------
          # 1. Verify changelog was modified
          # -----------------------------------------------------------
          CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || true)
          if ! echo "$CHANGED" | grep -q "changelog/CHANGELOG.md"; then
            echo "Changelog was not modified in this push. Skipping."
            exit 0
          fi

          # -----------------------------------------------------------
          # 2. Extract Version Impact from newest changelog entry
          # -----------------------------------------------------------
          # Get the first entry block (from first ## to next ##)
          ENTRY=$(awk '/^## \[/{if(found) exit; found=1} found{print}' changelog/CHANGELOG.md)

          VERSION_IMPACT=$(echo "$ENTRY" | grep -oP '(?<=\*\*Version Impact\*\*:\s).*' | head -1 | tr -d '[:space:]' || true)

          if [ -z "$VERSION_IMPACT" ]; then
            echo "::warning::Could not extract Version Impact from newest changelog entry. Skipping version assignment."
            exit 0
          fi

          echo "Detected Version Impact: $VERSION_IMPACT"

          # -----------------------------------------------------------
          # 3. Skip if no version bump needed
          # -----------------------------------------------------------
          if [[ "$VERSION_IMPACT" == "none" ]] || [[ "$VERSION_IMPACT" == "governance-only" ]]; then
            echo "Version Impact is '$VERSION_IMPACT'. No version bump required."
            exit 0
          fi

          # -----------------------------------------------------------
          # 4. Read current version
          # -----------------------------------------------------------
          if [ -f VERSION ]; then
            CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')
            echo "Current version from VERSION file: $CURRENT_VERSION"
          else
            CURRENT_VERSION=$(grep -oP '(?<=## \[)[0-9]+\.[0-9]+\.[0-9]+' changelog/CHANGELOG.md | head -1 || true)
            echo "No VERSION file found. Current version from CHANGELOG: $CURRENT_VERSION"
          fi

          if [ -z "$CURRENT_VERSION" ]; then
            echo "::error::Could not determine current version."
            exit 1
          fi

          # Validate version format
          if ! echo "$CURRENT_VERSION" | grep -qP '^\d+\.\d+\.\d+$'; then
            echo "::error::Current version '$CURRENT_VERSION' is not valid SemVer (expected X.Y.Z)."
            exit 1
          fi

          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # -----------------------------------------------------------
          # 5. Compute next version
          # -----------------------------------------------------------
          case "$VERSION_IMPACT" in
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            *)
              echo "::error::Unrecognized Version Impact: '$VERSION_IMPACT'."
              exit 1
              ;;
          esac

          echo "New version: $NEW_VERSION"

          # -----------------------------------------------------------
          # 6. Check if version already matches (idempotency)
          # -----------------------------------------------------------
          if [ -f VERSION ] && [ "$(cat VERSION | tr -d '[:space:]')" = "$NEW_VERSION" ]; then
            echo "VERSION file already contains $NEW_VERSION. No update needed."
            exit 0
          fi

          # -----------------------------------------------------------
          # 7. Write VERSION file
          # -----------------------------------------------------------
          echo "$NEW_VERSION" > VERSION
          echo "Written $NEW_VERSION to VERSION file."

          # -----------------------------------------------------------
          # 8. Commit and push
          # -----------------------------------------------------------
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore(version): bump to v${NEW_VERSION} [automated]"
          git push

          echo ""
          echo "==============================="
          echo "  Version Assignment Complete"
          echo "==============================="
          echo "  Previous: $CURRENT_VERSION"
          echo "  Impact:   $VERSION_IMPACT"
          echo "  New:      $NEW_VERSION"
          echo "==============================="
