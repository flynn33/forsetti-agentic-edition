name: Protected Path Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  protected-paths:
    name: Verify Approval Labels for Protected Paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check protected path approvals
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-protected-paths.ps1
