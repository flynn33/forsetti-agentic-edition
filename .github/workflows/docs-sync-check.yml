name: Documentation Sync Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-sync:
    name: Verify Wiki Sync for Canonical Sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed files
        id: changed
        uses: tj-actions/changed-files@v44

      - name: Check PR labels
        id: labels
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
        run: |
          HAS_SYNC_LABEL=false
          if echo "$PR_LABELS" | grep -q '"name":\s*"docs:needs-sync"'; then
            HAS_SYNC_LABEL=true
          fi
          echo "has_sync_label=$HAS_SYNC_LABEL" >> "$GITHUB_OUTPUT"

      - name: Check wiki sync for canonical sources
        env:
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
          HAS_SYNC_LABEL: ${{ steps.labels.outputs.has_sync_label }}
        run: |
          # Map canonical source files to their expected wiki counterparts
          declare -A CANONICAL_TO_WIKI
          CANONICAL_TO_WIKI=(
            ["FORSETTI_CONSTITUTION.md"]="wiki/FORSETTI_CONSTITUTION.md"
            ["AGENTS.md"]="wiki/AGENTS.md"
            ["COMPLIANCE_POLICY.md"]="wiki/COMPLIANCE_POLICY.md"
            ["RELEASE_POLICY.md"]="wiki/RELEASE_POLICY.md"
            ["CHANGE_CONTROL_POLICY.md"]="wiki/CHANGE_CONTROL_POLICY.md"
            ["DOCUMENTATION_POLICY.md"]="wiki/DOCUMENTATION_POLICY.md"
          )

          CANONICAL_CHANGED=()
          WIKI_CHANGED=()

          for file in $ALL_CHANGED_FILES; do
            # Check if file is a canonical source
            for canonical in "${!CANONICAL_TO_WIKI[@]}"; do
              if [[ "$file" == "$canonical" ]]; then
                CANONICAL_CHANGED+=("$canonical")
              fi
            done

            # Check if file is a wiki file
            if [[ "$file" == wiki/* ]]; then
              WIKI_CHANGED+=("$file")
            fi
          done

          if [ ${#CANONICAL_CHANGED[@]} -eq 0 ]; then
            echo "No canonical source files were modified. Check passed."
            exit 0
          fi

          echo "Canonical source files modified:"
          for canonical in "${CANONICAL_CHANGED[@]}"; do
            echo "  - $canonical"
          done

          # Check if corresponding wiki files were updated
          MISSING_SYNC=()
          for canonical in "${CANONICAL_CHANGED[@]}"; do
            EXPECTED_WIKI="${CANONICAL_TO_WIKI[$canonical]}"
            FOUND=false
            for wiki_file in "${WIKI_CHANGED[@]}"; do
              if [[ "$wiki_file" == "$EXPECTED_WIKI" ]]; then
                FOUND=true
                break
              fi
            done
            if [ "$FOUND" = false ]; then
              MISSING_SYNC+=("$canonical -> $EXPECTED_WIKI")
            fi
          done

          if [ ${#MISSING_SYNC[@]} -eq 0 ]; then
            echo "All canonical source changes have corresponding wiki updates. Check passed."
            exit 0
          fi

          # Wiki not updated — check for docs:needs-sync label
          if [ "$HAS_SYNC_LABEL" = "true" ]; then
            echo "::warning::Wiki files were not updated, but 'docs:needs-sync' label is present."
            echo "The following wiki files need to be synced in a follow-up:"
            for pair in "${MISSING_SYNC[@]}"; do
              echo "  - $pair"
            done
            exit 0
          fi

          # Neither wiki update nor label
          echo "::error::Canonical source files were modified but corresponding wiki files were not updated."
          echo ""
          echo "Missing wiki updates:"
          for pair in "${MISSING_SYNC[@]}"; do
            echo "  - $pair"
          done
          echo ""
          echo "Either update the wiki files in this PR, or add the 'docs:needs-sync' label"
          echo "to acknowledge that wiki sync will happen in a follow-up PR."
          exit 1
