name: AI Contributor Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-contributor-rejection:
    name: Reject AI Contributor Attribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI contributor attribution
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          VIOLATIONS=()

          # -----------------------------------------------------------
          # AI signature patterns
          # -----------------------------------------------------------
          # Co-Authored-By trailer patterns
          COAUTHOR_PATTERNS=(
            "claude"
            "gpt"
            "copilot"
            "gemini"
            "cursor"
            "anthropic"
            "openai"
            "noreply@anthropic\.com"
            "noreply@openai\.com"
            "copilot.*@github\.com"
            "github.*copilot"
            "claude.*code"
            "chatgpt"
          )

          # Email patterns for author/committer
          EMAIL_PATTERNS=(
            "noreply@anthropic\.com"
            "noreply@openai\.com"
            "copilot.*@github\.com"
            "bot@.*"
            "ai-assistant"
            "claude@"
            "gpt@"
          )

          # Name patterns for author/committer
          NAME_PATTERNS=(
            "^claude$"
            "^gpt"
            "^copilot$"
            "^github copilot$"
            "^gemini$"
            "^chatgpt$"
            "^claude code$"
            "^claude opus"
            "^claude sonnet"
            "^claude haiku"
            "\(bot\)"
            "\(ai\)"
          )

          # PR body AI attribution patterns
          PR_BODY_PATTERNS=(
            "generated with claude"
            "generated by claude"
            "co-authored by.*claude"
            "co-authored by.*gpt"
            "co-authored by.*copilot"
            "ai-generated"
            "generated with.*claude code"
            "generated by.*ai"
            "🤖.*generated"
            "co-authored-by:.*claude"
            "co-authored-by:.*anthropic"
            "co-authored-by:.*openai"
          )

          # -----------------------------------------------------------
          # 1. Check commit messages for Co-Authored-By trailers
          # -----------------------------------------------------------
          echo "Checking commit messages for AI co-author trailers..."

          while IFS= read -r line; do
            if [[ "$line" =~ ^[a-f0-9]{40}$ ]]; then
              CURRENT_COMMIT="$line"
              CURRENT_SHORT="${line:0:7}"
            else
              for pattern in "${COAUTHOR_PATTERNS[@]}"; do
                if echo "$line" | grep -iqE "co-authored-by.*${pattern}"; then
                  VIOLATIONS+=("Commit $CURRENT_SHORT: Co-Authored-By trailer matches AI pattern '${pattern}' — \"$line\"")
                  break
                fi
              done
            fi
          done < <(git log --format="%H%n%B" "$BASE_SHA".."$HEAD_SHA" 2>/dev/null)

          # -----------------------------------------------------------
          # 2. Check commit author and committer emails
          # -----------------------------------------------------------
          echo "Checking commit author/committer emails..."

          while IFS='|' read -r commit_hash author_email committer_email; do
            SHORT="${commit_hash:0:7}"
            for pattern in "${EMAIL_PATTERNS[@]}"; do
              if echo "$author_email" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Author email '$author_email' matches AI pattern '${pattern}'")
                break
              fi
              if echo "$committer_email" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Committer email '$committer_email' matches AI pattern '${pattern}'")
                break
              fi
            done
          done < <(git log --format="%H|%ae|%ce" "$BASE_SHA".."$HEAD_SHA" 2>/dev/null)

          # -----------------------------------------------------------
          # 3. Check commit author and committer names
          # -----------------------------------------------------------
          echo "Checking commit author/committer names..."

          while IFS='|' read -r commit_hash author_name committer_name; do
            SHORT="${commit_hash:0:7}"
            for pattern in "${NAME_PATTERNS[@]}"; do
              if echo "$author_name" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Author name '$author_name' matches AI pattern '${pattern}'")
                break
              fi
              if echo "$committer_name" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Committer name '$committer_name' matches AI pattern '${pattern}'")
                break
              fi
            done
          done < <(git log --format="%H|%an|%cn" "$BASE_SHA".."$HEAD_SHA" 2>/dev/null)

          # -----------------------------------------------------------
          # 4. Check PR body for AI attribution
          # -----------------------------------------------------------
          echo "Checking PR body for AI attribution footers..."

          if [ -n "$PR_BODY" ]; then
            for pattern in "${PR_BODY_PATTERNS[@]}"; do
              if echo "$PR_BODY" | grep -iqE "$pattern"; then
                MATCH=$(echo "$PR_BODY" | grep -iE "$pattern" | head -1 | sed 's/^[[:space:]]*//' | cut -c1-100)
                VIOLATIONS+=("PR body: AI attribution detected matching pattern '${pattern}' — \"$MATCH\"")
                break
              fi
            done
          fi

          # -----------------------------------------------------------
          # 5. Report results
          # -----------------------------------------------------------
          echo ""
          if [ ${#VIOLATIONS[@]} -gt 0 ]; then
            echo "::error::AI contributor attribution detected. This repository requires human authorship only."
            echo ""
            echo "========================================"
            echo "  AI Contributor Violations Found"
            echo "========================================"
            for violation in "${VIOLATIONS[@]}"; do
              echo "  - $violation"
            done
            echo "========================================"
            echo ""
            echo "Please remove AI attribution from commit messages and author fields."
            echo "Use 'git rebase -i' to amend commit messages, or"
            echo "'git commit --amend --author=\"Your Name <your@email.com>\"' to fix author fields."
            exit 1
          fi

          echo "No AI contributor attribution detected. Check passed."
