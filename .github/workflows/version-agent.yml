name: Version Agent

on:
  push:
    branches: [main]
    paths:
      - 'changelog/CHANGELOG.md'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (patch, minor, major)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: version-agent-main
  cancel-in-progress: false

jobs:
  assign-version:
    name: Assign Version and Tag Release
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assign version and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./adapters/github-actions/workflows/assign-version-release.ps1
