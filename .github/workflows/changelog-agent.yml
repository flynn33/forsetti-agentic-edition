name: Changelog Agent

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      title:
        description: 'Change title'
        required: true
        type: string
      change_class:
        description: 'Change class'
        required: true
        type: choice
        options:
          - feature
          - bugfix
          - refactor
          - docs
          - governance
          - metadata
          - breaking-change
      version_impact:
        description: 'Version impact'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - none
          - governance-only
      summary:
        description: 'Change summary (min 30 chars)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: changelog-agent-main
  cancel-in-progress: false

jobs:
  generate-changelog:
    name: Generate Changelog Entry
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true && github.actor != 'github-actions[bot]')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog entry
        shell: pwsh
        run: ./adapters/github-actions/workflows/update-changelog-entry.ps1
