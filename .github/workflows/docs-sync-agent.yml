name: Docs Sync Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync-main
  cancel-in-progress: false

jobs:
  sync-docs:
    name: Sync README and Documentation
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Update README sections
        run: |
          set -euo pipefail

          REPO_URL="https://github.com/${{ github.repository }}"

          # -----------------------------------------------------------
          # 1. Read current version
          # -----------------------------------------------------------
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="unreleased"
          fi

          echo "Current version: $VERSION"

          # -----------------------------------------------------------
          # 2. Update version badge in README if present
          # -----------------------------------------------------------
          if [ -f README.md ]; then
            # Update version badge
            if grep -q 'img.shields.io/badge/version-' README.md; then
              sed -i "s|img.shields.io/badge/version-[^)]*|img.shields.io/badge/version-v${VERSION}-blue|g" README.md
              echo "Updated version badge to v$VERSION"
            fi

            # -----------------------------------------------------------
            # 3. Update Repository Structure section
            # -----------------------------------------------------------
            # Check if README has a Repository Structure section
            if grep -q '## Repository Structure' README.md; then
              echo "Updating Repository Structure section..."

              # Generate current directory tree (depth 2, exclude hidden and common ignores)
              TREE=$(find . -maxdepth 2 \
                -not -path './.git*' \
                -not -path './node_modules*' \
                -not -path './__pycache__*' \
                -not -name '*.pyc' \
                | sort | awk '
                BEGIN { }
                {
                  # Remove leading ./
                  gsub(/^\.\//, "", $0)
                  if ($0 == "" || $0 == ".") next

                  # Count depth
                  n = split($0, parts, "/")
                  if (n > 2) next

                  # Build indent
                  indent = ""
                  for (i = 1; i < n; i++) indent = indent "  "

                  # Get basename
                  base = parts[n]

                  # Determine if directory
                  cmd = "test -d \"" $0 "\" && echo d || echo f"
                  cmd | getline ftype
                  close(cmd)

                  if (ftype == "d") base = base "/"

                  printf "%s├── %s\n", indent, base
                }')

              # Replace the tree block in README between ```/``` markers after "## Repository Structure"
              python3 -c "
          import re
          with open('README.md', 'r') as f:
              content = f.read()

          # Find the Repository Structure section and replace its code block
          pattern = r'(## Repository Structure\s*\n(?:.*?\n)*?)\`\`\`[^\n]*\n.*?\`\`\`'
          tree_content = '''$(echo "$TREE")'''

          def replacer(m):
              prefix = m.group(1)
              return prefix + '\`\`\`\n' + tree_content + '\n\`\`\`'

          new_content = re.sub(pattern, replacer, content, count=1, flags=re.DOTALL)

          if new_content != content:
              with open('README.md', 'w') as f:
                  f.write(new_content)
              print('Repository structure updated.')
          else:
              print('No structure changes detected.')
          " 2>/dev/null || echo "Tree update skipped (python3 not available or pattern not matched)."
            fi

            # -----------------------------------------------------------
            # 4. Update Role Model table if present
            # -----------------------------------------------------------
            if grep -q '## Role Model\|## Governed Roles' README.md && [ -d agents ]; then
              echo "Checking Role Model section..."

              # Verify all agent files are referenced in README
              MISSING_ROLES=""
              for agent_file in agents/*.md; do
                if [ -f "$agent_file" ]; then
                  ROLE_NAME=$(basename "$agent_file" .md)
                  if ! grep -qi "$ROLE_NAME" README.md; then
                    MISSING_ROLES="$MISSING_ROLES $ROLE_NAME"
                  fi
                fi
              done

              if [ -n "$MISSING_ROLES" ]; then
                echo "::warning::Roles not referenced in README:$MISSING_ROLES"
              else
                echo "All agent roles referenced in README."
              fi
            fi

            # -----------------------------------------------------------
            # 5. Update Document Hierarchy if present
            # -----------------------------------------------------------
            if grep -q '## Document Hierarchy\|## Authority Hierarchy' README.md; then
              echo "Checking Document Hierarchy section..."

              # Check that referenced documents exist
              STALE_REFS=""
              for doc in FORSETTI_CONSTITUTION.md COMPLIANCE_POLICY.md CHANGE_CONTROL_POLICY.md \
                         RELEASE_POLICY.md DOCUMENTATION_POLICY.md AGENTS.md VISION.md \
                         CONTRIBUTING.md CODE_OF_DELIVERY.md; do
                if grep -q "$doc" README.md && [ ! -f "$doc" ]; then
                  STALE_REFS="$STALE_REFS $doc"
                fi
              done

              if [ -n "$STALE_REFS" ]; then
                echo "::warning::README references missing documents:$STALE_REFS"
              else
                echo "All referenced documents exist."
              fi
            fi
          fi

      - name: Verify wiki-canonical source consistency
        run: |
          set -euo pipefail

          DRIFT_FOUND=false

          # Map of canonical sources to wiki pages
          declare -A WIKI_MAP=(
            ["FORSETTI_CONSTITUTION.md"]="wiki/Constitution.md"
            ["COMPLIANCE_POLICY.md"]="wiki/Compliance.md"
            ["RELEASE_POLICY.md"]="wiki/Releases.md"
          )

          for canonical in "${!WIKI_MAP[@]}"; do
            wiki_page="${WIKI_MAP[$canonical]}"

            if [ -f "$canonical" ] && [ -f "$wiki_page" ]; then
              # Check if canonical source content appears in wiki page
              # (wiki pages have headers/footers, so we check for key content)
              CANONICAL_FIRST_LINE=$(grep -v '^#' "$canonical" | grep -v '^$' | head -1 | cut -c1-60 || true)

              if [ -n "$CANONICAL_FIRST_LINE" ] && ! grep -qF "$CANONICAL_FIRST_LINE" "$wiki_page" 2>/dev/null; then
                echo "::warning::Wiki drift detected: $wiki_page may be out of sync with $canonical"
                DRIFT_FOUND=true
              fi
            fi
          done

          if [ "$DRIFT_FOUND" = true ]; then
            echo ""
            echo "Wiki drift detected. The Wiki Designer Agent should be re-run."
            echo "Trigger it manually via: Actions > Wiki Designer Agent > Run workflow"
          else
            echo "All wiki pages consistent with canonical sources."
          fi

      - name: Commit README updates
        run: |
          if git diff --quiet README.md 2>/dev/null; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): auto-sync README sections [automated]"
          git push

          echo "README updates committed."
