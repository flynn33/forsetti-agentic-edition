name: Docs Sync Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-sync-main
  cancel-in-progress: false

jobs:
  sync-docs:
    name: Sync README and Documentation
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Update README sections
        shell: pwsh
        run: ./adapters/github-actions/workflows/sync-documentation.ps1
