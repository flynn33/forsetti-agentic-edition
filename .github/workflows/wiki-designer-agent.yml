name: Wiki Designer Agent

on:
  push:
    branches: [main]
    paths:
      - 'FORSETTI_CONSTITUTION.md'
      - 'AGENTS.md'
      - 'agents/**'
      - 'COMPLIANCE_POLICY.md'
      - 'RELEASE_POLICY.md'
      - 'CHANGE_CONTROL_POLICY.md'
      - 'DOCUMENTATION_POLICY.md'
      - 'README.md'
      - 'changelog/CHANGELOG.md'
      - 'VERSION'
      - 'VISION.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_DELIVERY.md'
      - 'standards/**'
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-designer-main
  cancel-in-progress: false

jobs:
  design-wiki:
    name: Generate and Publish Wiki Pages
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate wiki pages
        run: |
          set -euo pipefail

          # -----------------------------------------------------------
          # Gather metadata
          # -----------------------------------------------------------
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | tr -d '[:space:]')
          else
            VERSION="unreleased"
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)
          REPO_URL="https://github.com/${{ github.repository }}"
          TODAY=$(date -u +%Y-%m-%d)

          echo "Version: $VERSION | Commit: $SHORT_SHA | Date: $TODAY"

          mkdir -p wiki

          # -----------------------------------------------------------
          # Helper: page header with badges and nav
          # -----------------------------------------------------------
          page_header() {
            local TITLE="$1"
            local CANONICAL="$2"
            cat <<HEADER
          # $TITLE

          [![Version](https://img.shields.io/badge/version-v${VERSION}-blue)]($REPO_URL) [![License](https://img.shields.io/badge/license-see%20repo-lightgrey)]($REPO_URL/blob/main/LICENSE.md)

          > **Canonical source**: [\`$CANONICAL\`]($REPO_URL/blob/main/$CANONICAL)
          > **Last synced**: v$VERSION \`$SHORT_SHA\` — $TODAY

          ---

          HEADER
          }

          # -----------------------------------------------------------
          # Helper: page footer with navigation
          # -----------------------------------------------------------
          page_footer() {
            cat <<FOOTER

          ---

          <sub>

          **Navigation**: [Home](Home) | [Constitution](Constitution) | [Agent Roles](Agent-Roles) | [Workflow](Workflow) | [Compliance](Compliance) | [Releases](Releases) | [Changelog](Changelog) | [Glossary](Glossary)

          *Auto-generated by the Wiki Designer Agent — v$VERSION \`$SHORT_SHA\`*

          </sub>
          FOOTER
          }

          # -----------------------------------------------------------
          # Helper: generate table of contents from markdown headings
          # -----------------------------------------------------------
          generate_toc() {
            local FILE="$1"
            echo "## Table of Contents"
            echo ""
            grep -E '^#{2,3} ' "$FILE" | while IFS= read -r line; do
              LEVEL=$(echo "$line" | grep -oE '^#+' | wc -c)
              LEVEL=$((LEVEL - 1))  # Remove trailing newline count
              TEXT=$(echo "$line" | sed 's/^#* //')
              ANCHOR=$(echo "$TEXT" | tr '[:upper:]' '[:lower:]' | sed 's/ /-/g' | sed 's/[^a-z0-9-]//g')
              if [ "$LEVEL" -le 3 ]; then
                INDENT=""
                if [ "$LEVEL" -eq 3 ]; then INDENT="  "; fi
                echo "${INDENT}- [$TEXT](#$ANCHOR)"
              fi
            done
            echo ""
          }

          # -----------------------------------------------------------
          # HOME PAGE
          # -----------------------------------------------------------
          echo "Generating Home.md..."
          {
            cat <<'HOMEHEADER'
          # Forsetti Agentic Edition

          [![Version](https://img.shields.io/badge/version-VPLACEHOLDER-blue)](URLPLACEHOLDER) [![License](https://img.shields.io/badge/license-see%20repo-lightgrey)](URLPLACEHOLDER/blob/main/LICENSE.md)

          > Constitutional governance for AI-led software delivery

          ---

          ## Welcome

          This wiki provides comprehensive documentation for the Forsetti Agentic Edition governance framework. All content is derived from canonical repository documents and kept in sync automatically.

          **Canonical sources are authoritative.** If a wiki page conflicts with a repository markdown file, the repository file is correct.

          ---

          ## Quick Navigation

          | Page | Description | Source |
          |:-----|:------------|:-------|
          | [Constitution](Constitution) | Foundational principles, authority hierarchy, and governance doctrine | `FORSETTI_CONSTITUTION.md` |
          | [Agent Roles](Agent-Roles) | The 5 governed roles, their authorities and boundaries | `AGENTS.md`, `agents/*.md` |
          | [Workflow](Workflow) | Change control lifecycle, approval classes, and documentation policy | `CHANGE_CONTROL_POLICY.md`, `DOCUMENTATION_POLICY.md` |
          | [Compliance](Compliance) | Evidence-based compliance model and blocking violations | `COMPLIANCE_POLICY.md` |
          | [Releases](Releases) | Versioning model, release readiness, and impact classification | `RELEASE_POLICY.md` |
          | [Changelog](Changelog) | Version history and change records | `changelog/CHANGELOG.md` |
          | [Glossary](Glossary) | Key terms and definitions | Various |

          ---

          ## Core Principles

          1. **Contract Before Action** — No work begins without a governing contract
          2. **Scope Is Binding** — Stay within defined boundaries
          3. **Truthfulness Is Mandatory** — Report status honestly
          4. **Governance Overrides Convenience** — Process exists for a reason
          5. **Documentation Is Part of Delivery** — Undocumented work is incomplete
          6. **Compliance Must Be Measurable** — Evidence over assertions
          7. **Release Integrity Is Non-Negotiable** — Quality gates cannot be bypassed

          ---

          ## Document Authority Hierarchy

          ```
          Level 1: FORSETTI_CONSTITUTION.md        (supreme authority)
          Level 2: *_POLICY.md documents            (binding policy)
          Level 3: standards/*.md                    (implementation standards)
          Level 4: contracts/*.md                    (task-level governance)
          Level 5: policies/*.json                   (machine-readable manifests)
          Level 6: AGENTS.md + agents/*.md           (role instructions)
          Level 7: wiki/ pages                       (derived, non-authoritative)
          ```

          ---

          ## Getting Started

          1. Read the [Constitution](Constitution) to understand governance principles
          2. Review [Agent Roles](Agent-Roles) to understand the role model
          3. Study the [Workflow](Workflow) for change control procedures
          4. Check [Compliance](Compliance) for blocking violation rules

          HOMEHEADER

            page_footer
          } | sed "s|VPLACEHOLDER|v$VERSION|g" | sed "s|URLPLACEHOLDER|$REPO_URL|g" > wiki/Home.md

          # -----------------------------------------------------------
          # CONSTITUTION PAGE
          # -----------------------------------------------------------
          echo "Generating Constitution.md..."
          {
            page_header "Constitution" "FORSETTI_CONSTITUTION.md"

            if [ -f FORSETTI_CONSTITUTION.md ]; then
              # Strip H1 heading
              tail -n +2 FORSETTI_CONSTITUTION.md | sed '1{/^$/d}'
            else
              echo "*Constitution document not found.*"
            fi

            page_footer
          } > wiki/Constitution.md

          # -----------------------------------------------------------
          # AGENT ROLES PAGE
          # -----------------------------------------------------------
          echo "Generating Agent-Roles.md..."
          {
            cat <<AGENTHEADER
          # Agent Roles

          [![Version](https://img.shields.io/badge/version-v${VERSION}-blue)]($REPO_URL) [![License](https://img.shields.io/badge/license-see%20repo-lightgrey)]($REPO_URL/blob/main/LICENSE.md)

          > **Canonical sources**: [\`AGENTS.md\`]($REPO_URL/blob/main/AGENTS.md), [\`agents/*.md\`]($REPO_URL/tree/main/agents)
          > **Last synced**: v$VERSION \`$SHORT_SHA\` — $TODAY

          ---

          ## Overview

          The Forsetti Agentic Edition defines **5 governed roles**. Each role has specific authorities, boundaries, and responsibilities.

          | Role | Primary Responsibility | Authority Level |
          |:-----|:----------------------|:----------------|
          AGENTHEADER

            # Build role summary table from agent files
            for agent_file in agents/*.md; do
              if [ -f "$agent_file" ]; then
                ROLE_NAME=$(basename "$agent_file" .md | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                # Extract first sentence as description
                DESC=$(grep -v '^#' "$agent_file" | grep -v '^$' | head -1 | cut -c1-80 || echo "See role definition")
                echo "| **$ROLE_NAME** | $DESC | See below |"
              fi
            done

            echo ""
            echo "---"
            echo ""

            # Include main AGENTS.md content
            if [ -f AGENTS.md ]; then
              echo "## General Agent Instructions"
              echo ""
              tail -n +2 AGENTS.md | sed '1{/^$/d}'
              echo ""
              echo "---"
              echo ""
            fi

            # Include individual role definitions
            echo "## Individual Role Definitions"
            echo ""

            for agent_file in agents/*.md; do
              if [ -f "$agent_file" ]; then
                ROLE_NAME=$(basename "$agent_file" .md | sed 's/-/ /g' | sed 's/\b\(.\)/\u\1/g')
                echo "### $ROLE_NAME"
                echo ""
                echo "> Source: [\`$agent_file\`]($REPO_URL/blob/main/$agent_file)"
                echo ""
                tail -n +2 "$agent_file" | sed '1{/^$/d}'
                echo ""
                echo "---"
                echo ""
              fi
            done

            page_footer
          } > wiki/Agent-Roles.md

          # -----------------------------------------------------------
          # WORKFLOW PAGE
          # -----------------------------------------------------------
          echo "Generating Workflow.md..."
          {
            cat <<WFHEADER
          # Workflow

          [![Version](https://img.shields.io/badge/version-v${VERSION}-blue)]($REPO_URL) [![License](https://img.shields.io/badge/license-see%20repo-lightgrey)]($REPO_URL/blob/main/LICENSE.md)

          > **Canonical sources**: [\`CHANGE_CONTROL_POLICY.md\`]($REPO_URL/blob/main/CHANGE_CONTROL_POLICY.md), [\`DOCUMENTATION_POLICY.md\`]($REPO_URL/blob/main/DOCUMENTATION_POLICY.md)
          > **Last synced**: v$VERSION \`$SHORT_SHA\` — $TODAY

          ---

          WFHEADER

            echo "## Change Control Policy"
            echo ""

            if [ -f CHANGE_CONTROL_POLICY.md ]; then
              tail -n +2 CHANGE_CONTROL_POLICY.md | sed '1{/^$/d}'
            fi

            echo ""
            echo "---"
            echo ""
            echo "## Documentation Policy"
            echo ""

            if [ -f DOCUMENTATION_POLICY.md ]; then
              tail -n +2 DOCUMENTATION_POLICY.md | sed '1{/^$/d}'
            fi

            page_footer
          } > wiki/Workflow.md

          # -----------------------------------------------------------
          # COMPLIANCE PAGE
          # -----------------------------------------------------------
          echo "Generating Compliance.md..."
          {
            page_header "Compliance" "COMPLIANCE_POLICY.md"

            if [ -f COMPLIANCE_POLICY.md ]; then
              tail -n +2 COMPLIANCE_POLICY.md | sed '1{/^$/d}'
            fi

            page_footer
          } > wiki/Compliance.md

          # -----------------------------------------------------------
          # RELEASES PAGE
          # -----------------------------------------------------------
          echo "Generating Releases.md..."
          {
            page_header "Releases" "RELEASE_POLICY.md"

            if [ -f RELEASE_POLICY.md ]; then
              tail -n +2 RELEASE_POLICY.md | sed '1{/^$/d}'
            fi

            echo ""
            echo "---"
            echo ""
            echo "## Current Version"
            echo ""
            echo "**v$VERSION** — See the [Changelog](Changelog) for details."
            echo ""

            page_footer
          } > wiki/Releases.md

          # -----------------------------------------------------------
          # CHANGELOG PAGE
          # -----------------------------------------------------------
          echo "Generating Changelog.md..."
          {
            cat <<CLHEADER
          # Changelog

          [![Version](https://img.shields.io/badge/version-v${VERSION}-blue)]($REPO_URL) [![License](https://img.shields.io/badge/license-see%20repo-lightgrey)]($REPO_URL/blob/main/LICENSE.md)

          > **Canonical source**: [\`changelog/CHANGELOG.md\`]($REPO_URL/blob/main/changelog/CHANGELOG.md)
          > **Last synced**: v$VERSION \`$SHORT_SHA\` — $TODAY

          All notable changes to the Forsetti Agentic Edition governance framework.

          ---

          CLHEADER

            if [ -f changelog/CHANGELOG.md ]; then
              # Skip the header block, include entries
              awk '/^## \[/{found=1} found{print}' changelog/CHANGELOG.md
            else
              echo "*No changelog entries yet.*"
            fi

            page_footer
          } > wiki/Changelog.md

          # -----------------------------------------------------------
          # GLOSSARY — preserve existing if present
          # -----------------------------------------------------------
          if [ ! -f wiki/Glossary.md ]; then
            echo "Generating Glossary.md (stub)..."
            {
              page_header "Glossary" "Various"
              echo "## Key Terms"
              echo ""
              echo "| Term | Definition |"
              echo "|:-----|:-----------|"
              echo "| **Agent** | An AI-powered role operating under Forsetti governance |"
              echo "| **Contract** | A task-level governance document defining scope and deliverables |"
              echo "| **Canonical Source** | The authoritative repository file for a piece of content |"
              echo "| **Change Class** | Classification of a change (feature, bugfix, refactor, etc.) |"
              echo "| **Compliance** | Adherence to Forsetti governance rules, measured by evidence |"
              echo "| **Governance** | The system of rules, policies, and enforcement mechanisms |"
              echo "| **SemVer** | Semantic Versioning (MAJOR.MINOR.PATCH) |"
              echo "| **Version Impact** | The effect of a change on the version number |"
              page_footer
            } > wiki/Glossary.md
          fi

          # -----------------------------------------------------------
          # SIDEBAR (GitHub Wiki _Sidebar.md)
          # -----------------------------------------------------------
          echo "Generating _Sidebar.md..."
          {
            echo "## Forsetti Agentic Edition"
            echo ""
            echo "**v$VERSION**"
            echo ""
            echo "---"
            echo ""
            echo "- [Home](Home)"
            echo "- [Constitution](Constitution)"
            echo "- [Agent Roles](Agent-Roles)"
            echo "- [Workflow](Workflow)"
            echo "- [Compliance](Compliance)"
            echo "- [Releases](Releases)"
            echo "- [Changelog](Changelog)"
            echo "- [Glossary](Glossary)"
            echo ""
            echo "---"
            echo ""
            echo "<sub>Auto-synced from repository</sub>"
          } > wiki/_Sidebar.md

          # -----------------------------------------------------------
          # FOOTER (GitHub Wiki _Footer.md)
          # -----------------------------------------------------------
          echo "Generating _Footer.md..."
          {
            echo "---"
            echo ""
            echo "<sub>"
            echo ""
            echo "**Forsetti Agentic Edition** v$VERSION | [Repository]($REPO_URL) | [Issues]($REPO_URL/issues)"
            echo ""
            echo "Wiki auto-generated by the Wiki Designer Agent. Canonical sources are authoritative."
            echo ""
            echo "</sub>"
          } > wiki/_Footer.md

          echo ""
          echo "All wiki pages generated successfully."

      - name: Commit wiki updates to repository
        run: |
          if git diff --quiet wiki/ 2>/dev/null; then
            echo "No wiki changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wiki/
          git commit -m "docs(wiki): regenerate wiki pages [automated]"
          git push

          echo "Wiki pages committed to repository."

      - name: Publish to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"

          # -----------------------------------------------------------
          # Clone or initialize wiki repo
          # -----------------------------------------------------------
          if git clone "$WIKI_URL" /tmp/wiki-publish 2>/dev/null; then
            echo "Cloned existing wiki."
          else
            echo "Wiki does not exist yet. Initializing..."
            mkdir -p /tmp/wiki-publish
            cd /tmp/wiki-publish
            git init
            git remote add origin "$WIKI_URL"
            cd -
          fi

          # -----------------------------------------------------------
          # Copy generated pages to wiki repo
          # -----------------------------------------------------------
          cp wiki/*.md /tmp/wiki-publish/

          cd /tmp/wiki-publish

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to publish to GitHub Wiki."
            exit 0
          fi

          git commit -m "docs(wiki): sync from repository [automated]"
          git push origin HEAD 2>/dev/null || git push --set-upstream origin master

          echo "Wiki published to GitHub Wiki successfully."
