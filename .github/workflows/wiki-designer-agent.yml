name: Wiki Designer Agent

on:
  push:
    branches: [main]
    paths:
      - 'FORSETTI_CONSTITUTION.md'
      - 'AGENTS.md'
      - 'agents/**'
      - 'COMPLIANCE_POLICY.md'
      - 'RELEASE_POLICY.md'
      - 'CHANGE_CONTROL_POLICY.md'
      - 'DOCUMENTATION_POLICY.md'
      - 'README.md'
      - 'changelog/CHANGELOG.md'
      - 'VERSION'
      - 'VISION.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_DELIVERY.md'
      - 'standards/**'
      - 'wiki/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-designer-main
  cancel-in-progress: false

jobs:
  design-wiki:
    name: Generate and Publish Wiki Pages
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and publish wiki pages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./adapters/github-actions/workflows/sync-wiki-pages.ps1
