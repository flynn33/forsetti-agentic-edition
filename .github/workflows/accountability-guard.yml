name: Accountability Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  accountability-guard:
    name: Reject Restricted Attribution
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check accountability metadata
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-accountability-guard.ps1
