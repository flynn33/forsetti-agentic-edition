name: AI Contributor Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  ai-attribution-rejection:
    name: Reject AI Contributor Attribution
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for restricted contributor attribution
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-ai-contributor-attribution.ps1
