name: AI Contributor Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  ai-attribution-rejection:
    name: Reject AI Contributor Attribution
    runs-on: ubuntu-latest
    # Skip bot-generated commits to prevent loops
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI contributor attribution
        env:
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          AFTER_SHA: ${{ github.event.after || '' }}
        run: |
          set -euo pipefail
          VIOLATIONS=()

          # -----------------------------------------------------------
          # Determine commit range based on event type
          # -----------------------------------------------------------
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE_START="$BASE_SHA"
            RANGE_END="$HEAD_SHA"
          elif [ "$EVENT_NAME" = "push" ]; then
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              RANGE_START="$BEFORE_SHA"
              RANGE_END="$AFTER_SHA"
            else
              echo "Initial push or force-push detected. Checking last commit only."
              RANGE_START="HEAD~1"
              RANGE_END="HEAD"
            fi
          else
            echo "Unsupported event: $EVENT_NAME"
            exit 0
          fi

          # -----------------------------------------------------------
          # AI signature patterns — comprehensive list
          # -----------------------------------------------------------
          COAUTHOR_PATTERNS=(
            "claude"
            "gpt"
            "copilot"
            "gemini"
            "cursor"
            "anthropic"
            "openai"
            "noreply@anthropic\.com"
            "noreply@openai\.com"
            "copilot.*@github\.com"
            "github.*copilot"
            "claude.*code"
            "chatgpt"
            "windsurf"
            "codewhisperer"
            "codeium"
            "tabnine"
            "sourcegraph.*cody"
            "devin"
            "replit.*ai"
            "amazon.*q"
          )

          EMAIL_PATTERNS=(
            "noreply@anthropic\.com"
            "noreply@openai\.com"
            "copilot.*@github\.com"
            "bot@.*"
            "ai-assistant"
            "claude@"
            "gpt@"
            "cursor@"
            "devin@"
            "codeium@"
            "tabnine@"
          )

          NAME_PATTERNS=(
            "^claude$"
            "^gpt"
            "^copilot$"
            "^github copilot$"
            "^gemini$"
            "^chatgpt$"
            "^claude code$"
            "^claude opus"
            "^claude sonnet"
            "^claude haiku"
            "^cursor$"
            "^windsurf$"
            "^devin$"
            "^codeium$"
            "^tabnine$"
            "^cody$"
            "^amazon q$"
            "\(bot\)"
            "\(ai\)"
          )

          PR_BODY_PATTERNS=(
            "generated with claude"
            "generated by claude"
            "co-authored by.*claude"
            "co-authored by.*gpt"
            "co-authored by.*copilot"
            "co-authored by.*cursor"
            "co-authored by.*gemini"
            "ai-generated"
            "generated with.*claude code"
            "generated by.*ai"
            "🤖.*generated"
            "co-authored-by:.*claude"
            "co-authored-by:.*anthropic"
            "co-authored-by:.*openai"
            "generated with.*cursor"
            "generated with.*copilot"
            "generated by.*windsurf"
            "generated by.*devin"
          )

          # -----------------------------------------------------------
          # 1. Check commit messages for Co-Authored-By trailers
          # -----------------------------------------------------------
          echo "=== Checking commit messages for AI co-author trailers ==="

          while IFS= read -r line; do
            if [[ "$line" =~ ^[a-f0-9]{40}$ ]]; then
              CURRENT_COMMIT="$line"
              CURRENT_SHORT="${line:0:7}"
            else
              for pattern in "${COAUTHOR_PATTERNS[@]}"; do
                if echo "$line" | grep -iqE "co-authored-by.*${pattern}"; then
                  VIOLATIONS+=("Commit $CURRENT_SHORT: Co-Authored-By trailer matches AI pattern '${pattern}' — \"$line\"")
                  break
                fi
              done
            fi
          done < <(git log --format="%H%n%B" "$RANGE_START".."$RANGE_END" 2>/dev/null || true)

          # -----------------------------------------------------------
          # 2. Check commit author and committer emails
          # -----------------------------------------------------------
          echo "=== Checking commit author/committer emails ==="

          while IFS='|' read -r commit_hash author_email committer_email; do
            SHORT="${commit_hash:0:7}"
            for pattern in "${EMAIL_PATTERNS[@]}"; do
              if echo "$author_email" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Author email '$author_email' matches AI pattern '${pattern}'")
                break
              fi
              if echo "$committer_email" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Committer email '$committer_email' matches AI pattern '${pattern}'")
                break
              fi
            done
          done < <(git log --format="%H|%ae|%ce" "$RANGE_START".."$RANGE_END" 2>/dev/null || true)

          # -----------------------------------------------------------
          # 3. Check commit author and committer names
          # -----------------------------------------------------------
          echo "=== Checking commit author/committer names ==="

          while IFS='|' read -r commit_hash author_name committer_name; do
            SHORT="${commit_hash:0:7}"
            for pattern in "${NAME_PATTERNS[@]}"; do
              if echo "$author_name" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Author name '$author_name' matches AI pattern '${pattern}'")
                break
              fi
              if echo "$committer_name" | grep -iqE "$pattern"; then
                VIOLATIONS+=("Commit $SHORT: Committer name '$committer_name' matches AI pattern '${pattern}'")
                break
              fi
            done
          done < <(git log --format="%H|%an|%cn" "$RANGE_START".."$RANGE_END" 2>/dev/null || true)

          # -----------------------------------------------------------
          # 4. Check PR body for AI attribution (PR events only)
          # -----------------------------------------------------------
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_BODY" ]; then
            echo "=== Checking PR body for AI attribution ==="
            for pattern in "${PR_BODY_PATTERNS[@]}"; do
              if echo "$PR_BODY" | grep -iqE "$pattern"; then
                MATCH=$(echo "$PR_BODY" | grep -iE "$pattern" | head -1 | sed 's/^[[:space:]]*//' | cut -c1-120)
                VIOLATIONS+=("PR body: AI attribution detected — \"$MATCH\"")
                break
              fi
            done
          fi

          # -----------------------------------------------------------
          # 5. Report results
          # -----------------------------------------------------------
          echo ""
          if [ ${#VIOLATIONS[@]} -gt 0 ]; then
            echo "::error::AI contributor attribution detected. This repository requires human authorship only."
            echo ""
            echo "========================================"
            echo "  AI CONTRIBUTOR VIOLATIONS"
            echo "========================================"
            for violation in "${VIOLATIONS[@]}"; do
              echo "  ✗ $violation"
            done
            echo "========================================"
            echo ""
            echo "Remediation:"
            echo "  • Remove Co-Authored-By trailers: git rebase -i and edit commit messages"
            echo "  • Fix author fields: git commit --amend --author=\"Your Name <your@email.com>\""
            echo "  • Remove AI attribution from PR description"
            echo ""
            echo "This repository enforces human-only authorship per the Forsetti Constitution."
            exit 1
          fi

          echo "✓ No AI contributor attribution detected. Guard passed."
