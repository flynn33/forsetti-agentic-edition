name: PR Policy Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-pr-template:
    name: Validate PR Template Sections
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate required PR sections
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-pr-template.ps1
