name: Version Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  version-impact-check:
    name: Validate Version Impact Classification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version impact
        shell: pwsh
        run: ./adapters/github-actions/workflows/check-version-impact.ps1
